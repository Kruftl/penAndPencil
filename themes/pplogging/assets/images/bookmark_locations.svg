<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="34" height="165" viewBox="0 0 34 165">
  <defs>
    <linearGradient id="gl" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#6A8E6A"/>
      <stop offset="40%"  stop-color="#5A7A5A"/>
      <stop offset="100%" stop-color="#3D5C3D"/>
    </linearGradient>
    <filter id="fl" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="4" seed="11" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grey"/>
      <feComponentTransfer in="grey" result="dimmed">
        <feFuncA type="linear" slope="0.18"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="dimmed" mode="overlay"/>
    </filter>
  </defs>

  <path d="M 2,0 L 34,0 L 34,146 L 18,163 L 2,146 Z"
        fill="url(#gl)" filter="url(#fl)"/>

  <rect x="2" y="0" width="5" height="146" fill="rgba(0,0,0,0.22)"/>
  <line x1="34" y1="0" x2="34" y2="146" stroke="rgba(200,240,200,0.12)" stroke-width="1"/>
  <line x1="8" y1="10" x2="8" y2="140"
        stroke="rgba(0,0,0,0.28)" stroke-width="0.8" stroke-dasharray="5,5"/>

  <text transform="translate(18,71) rotate(90)"
        text-anchor="middle"
        font-family="Georgia, serif"
        font-size="9.5"
        font-weight="bold"
        letter-spacing="3"
        fill="rgba(230,250,220,0.92)">ORTE</text>
</svg>
